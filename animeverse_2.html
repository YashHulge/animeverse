.anime-card {
  background-color: transparent;
  border: none;
}

/* Wrapper to keep the zoom effect inside the poster bounds */
.img-wrapper {
  overflow: hidden;
  border-radius: 8px; /* Optional: gives the posters nice rounded corners */
}

.anime-card img {
  width: 100%;
  height: 450px; /* Locks the height so all posters align perfectly */
  object-fit: cover; /* Prevents the image from stretching/squishing */
  transition: transform 0.3s ease;
  cursor: pointer;
}

.anime-card img:hover {
  transform: scale(1.1);
}
